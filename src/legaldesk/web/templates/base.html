<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}LegalDesk{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="app-header">
    <div class="app-header__inner">
      <div class="app-header__logo">&#9878; LegalDesk</div>
      <nav class="app-header__nav">
        <a href="/">Новый запрос</a>
        <a href="/health">Статус системы</a>
      </nav>
    </div>
  </header>
  <main class="app-container">
    {% block step_indicator %}{% endblock %}
    {% block content %}{% endblock %}
  </main>
  <footer class="app-footer">
    LegalDesk v0.2.0 &mdash; АРМ Юриста
  </footer>
</body>
</html>
